<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Card Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
:root{--bg:#0c0c0c;--s1:#161616;--s2:#1f1f1f;--b1:#2a2a2a;--b2:#3a3a3a;--tx:#efefef;--t2:#999;--t3:#555;--acc:#c9f05a;--red:#ff6b6b;--grn:#5cffa0;--blu:#5cb8ff;--amb:#ffb84d;--pur:#c47fff;--r:10px;--rs:6px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}
.app{max-width:1140px;margin:0 auto;padding:1.75rem 1.5rem 5rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:10px}
.logo{font-family:'DM Mono',monospace;font-size:12px;color:var(--acc);letter-spacing:.08em}
.logo span{color:var(--t2)}
.tabs-wrap{display:flex;margin-bottom:1.5rem;border-bottom:.5px solid var(--b2);overflow-x:auto}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;color:var(--t2);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;background:transparent;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif}
.tab:hover{color:var(--tx)}.tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.tab-add{padding:8px 14px;font-size:18px;cursor:pointer;color:var(--t3);background:transparent;border:none;transition:color .15s}
.tab-add:hover{color:var(--acc)}
.url-bar{display:flex;gap:8px;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap}
.url-input{flex:1;min-width:260px;background:var(--s1);border:.5px solid var(--b2);border-radius:var(--rs);padding:8px 12px;color:var(--tx);font-family:'DM Mono',monospace;font-size:12px;outline:none}
.url-input:focus{border-color:var(--acc)}.url-input::placeholder{color:var(--t3)}
.upload-meta{display:grid;grid-template-columns:1fr 280px;gap:12px;margin-bottom:1.25rem}
@media(max-width:680px){.upload-meta{grid-template-columns:1fr}}
.upload-zone{border:1.5px dashed var(--b2);border-radius:var(--r);padding:1.75rem;text-align:center;cursor:pointer;position:relative;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--acc);background:rgba(201,240,90,.04)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.meta-card{background:var(--s1);border:.5px solid var(--b2);border-radius:var(--r);padding:1rem;display:flex;flex-direction:column;gap:10px}
.meta-card label{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:3px}
.mi{width:100%;background:var(--s2);border:.5px solid var(--b2);border-radius:var(--rs);padding:7px 10px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.mi:focus{border-color:var(--acc)}.mi::placeholder{color:var(--t3)}
.status{padding:9px 14px;border-radius:var(--rs);font-size:13px;margin-bottom:1rem;display:none;align-items:center;gap:10px}
.status.info{background:rgba(92,184,255,.1);border:.5px solid rgba(92,184,255,.3);color:var(--blu);display:flex}
.status.success{background:rgba(92,255,160,.08);border:.5px solid rgba(92,255,160,.25);color:var(--grn);display:flex}
.status.error{background:rgba(255,107,107,.1);border:.5px solid rgba(255,107,107,.3);color:var(--red);display:flex}
.sp{width:13px;height:13px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem}
.stat{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--r);padding:13px 15px}
.sl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.sv{font-size:20px;font-weight:500;font-family:'DM Mono',monospace}
.ac{color:var(--acc)}.rd{color:var(--red)}.gn{color:var(--grn)}.bl{color:var(--blu)}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.ti{background:var(--s1);border:.5px solid var(--b2);border-radius:var(--rs);padding:7px 11px;color:var(--tx);font-size:13px;outline:none;font-family:'DM Sans',sans-serif}
.ti.srch{flex:1;min-width:160px}
.btn{padding:7px 13px;border-radius:var(--rs);border:.5px solid var(--b2);background:transparent;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--s2)}.btn.ag{background:var(--acc);color:#0c0c0c;border-color:var(--acc);font-weight:500}
.btn.ag:hover{background:#b8dc4a}.btn.ar{color:var(--red);border-color:rgba(255,107,107,.25)}
.tw{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--r);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--s2);padding:9px 13px;text-align:left;font-weight:500;font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;border-bottom:.5px solid var(--b1);white-space:nowrap}
tbody tr{border-bottom:.5px solid var(--b1);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--s2)}
tbody tr.dk td:not(.nd){opacity:.4}
td{padding:9px 13px;vertical-align:middle}
.dbt{color:var(--red)}.cdt{color:var(--grn)}
.bb{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;background:rgba(92,184,255,.12);color:var(--blu)}
.bg{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.bf{background:rgba(201,240,90,.12);color:var(--acc)}.bs{background:rgba(92,184,255,.12);color:var(--blu)}
.btr{background:rgba(255,184,77,.12);color:var(--amb)}.btv{background:rgba(92,255,160,.12);color:var(--grn)}
.bh{background:rgba(255,107,107,.1);color:var(--red)}.be{background:rgba(196,127,255,.12);color:var(--pur)}
.bu{background:rgba(153,153,153,.12);color:var(--t2)}.bo{background:rgba(68,68,68,.3);color:var(--t2)}
.ri{width:100%;background:transparent;border:none;border-bottom:.5px solid transparent;color:var(--tx);font-size:13px;padding:2px 4px;outline:none;font-family:'DM Sans',sans-serif}
.ri:focus{border-bottom-color:var(--acc)}.ri::placeholder{color:var(--t3)}
input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--acc)}
.empty{text-align:center;padding:3rem 1rem;color:var(--t2)}
.ms{display:flex;gap:16px;flex-wrap:wrap;padding:10px 14px;background:var(--s1);border:.5px solid var(--b1);border-radius:var(--rs);margin-bottom:1rem;font-size:12px;color:var(--t2)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <div class="logo">ri5al <span>/ credit card tracker</span></div>
  <div style="display:flex;gap:8px">
    <button class="btn ar" onclick="clearMonth()" id="clrBtn" style="display:none">✕ Clear</button>
    <button class="btn ag" onclick="sendToSheets()" id="shBtn" style="display:none">↑ Send to Sheets</button>
  </div>
</div>
<div class="url-bar">
  <span style="font-size:12px;color:var(--t2);white-space:nowrap">Sheets URL:</span>
  <input class="url-input" id="sheetsUrl" type="text" placeholder="https://script.google.com/macros/s/YOUR_ID/exec" oninput="saveUrl()">
  <button class="btn" style="font-size:12px" onclick="testConn()">Test ↗</button>
</div>
<div class="tabs-wrap" id="tabsWrap"><button class="tab-add" onclick="addMonth()">+</button></div>
<div class="upload-meta">
  <div class="upload-zone" id="dz" ondragover="og(event,true)" ondragleave="og(event,false)" ondrop="od(event)">
    <input type="file" accept=".pdf" onchange="handleFile(this.files[0])">
    <div style="font-size:2rem">📄</div>
    <div style="font-size:14px;font-weight:500">Drop credit card statement PDF</div>
    <div style="font-size:12px;color:var(--t2)">HDFC · Axis · SBI · ICICI · any Indian bank · any UAE bank</div>
  </div>
  <div class="meta-card">
    <div><label>Bank name</label><input class="mi" id="bankName" type="text" placeholder="e.g. HDFC, Axis, SBI, ENBD..."></div>
    <div><label>Card nickname</label><input class="mi" id="cardName" type="text" placeholder="e.g. Millennia, Visa Platinum..."></div>
    <div><label>Month</label><select class="mi" id="monthSel"></select></div>
    <div><label>Currency</label>
      <select class="mi" id="curSel">
        <option value="INR">INR — Indian Rupee</option>
        <option value="AED">AED — UAE Dirham</option>
        <option value="USD">USD — US Dollar</option>
      </select>
    </div>
  </div>
</div>
<div class="status" id="sb"><div class="sp" id="sp" style="display:none"></div><span id="sm"></span></div>
<div id="mc"></div>
</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
var store={},am='';
var MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var NOW=new Date();
(function(){
  try{store=JSON.parse(localStorage.getItem('cc2')||'{}');}catch(e){store={};}
  var sv=localStorage.getItem('surl');if(sv)document.getElementById('sheetsUrl').value=sv;
  var sel=document.getElementById('monthSel');
  for(var y=NOW.getFullYear();y>=NOW.getFullYear()-2;y--)
    for(var m=11;m>=0;m--){var o=document.createElement('option');o.value=MN[m]+' '+y;o.textContent=MN[m]+' '+y;sel.appendChild(o);}
  sel.value=MN[NOW.getMonth()]+' '+NOW.getFullYear();
  rTabs();
  var k=Object.keys(store);if(k.length)sw(k[0]);
})();
function saveUrl(){localStorage.setItem('surl',document.getElementById('sheetsUrl').value.trim());}
function ss(){localStorage.setItem('cc2',JSON.stringify(store));}
function rTabs(){
  var w=document.getElementById('tabsWrap'),a=w.querySelector('.tab-add');
  w.querySelectorAll('.tab').forEach(function(t){t.remove();});
  Object.keys(store).forEach(function(m){
    var b=document.createElement('button');
    b.className='tab'+(m===am?' active':'');
    b.textContent=m+' ('+(store[m]?store[m].length:0)+')';
    b.onclick=function(){sw(m);};
    w.insertBefore(b,a);
  });
}
function addMonth(){var m=document.getElementById('monthSel').value;if(!store[m])store[m]=[];ss();sw(m);}
function sw(m){am=m;rTabs();rMC();}
function og(e,a){e.preventDefault();document.getElementById('dz').classList.toggle('drag',a);}
function od(e){e.preventDefault();og(e,false);var f=e.dataTransfer.files[0];if(f&&f.type==='application/pdf')handleFile(f);else showSt('Please drop a PDF file.','error');}

// Auto-detect month from PDF text
function detectMonth(lines){
  var MNS=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  var MNL=['january','february','march','april','may','june','july','august','september','october','november','december'];
  // Look for patterns like "19 Feb, 2026 - 18 Mar, 2026" or "Statement Period: 24/02/2026 - 22/03/2026" or "Mar 2026"
  for(var i=0;i<Math.min(lines.length,60);i++){
    var line=lines[i].toLowerCase();
    // Pattern: billing period with date range - use END date as statement month
    // e.g. "19 Feb, 2026 - 18 Mar, 2026" → Mar 2026
    var rangeRe=/\b(\d{1,2})\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*[,\s]+(\d{4})\s*[-–to]+\s*(\d{1,2})\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*[,\s]+(\d{4})/i;
    var rm=line.match(rangeRe);
    if(rm){
      var mi=MNS.indexOf(rm[5].toLowerCase().slice(0,3));
      if(mi>=0){var mn=('Jan,Feb,Mar,Apr,May,Jun,Jul,Aug,Sep,Oct,Nov,Dec').split(',')[mi];return mn+' '+rm[6];}
    }
    // Pattern: DD/MM/YYYY - DD/MM/YYYY range
    var dateRangeRe=/(\d{2})[\/\-](\d{2})[\/\-](\d{4})\s*[-–to]+(\d{2})[\/\-](\d{2})[\/\-](\d{4})/;
    var dr=line.match(dateRangeRe);
    if(dr){
      var endM=parseInt(dr[5])-1;
      var endY=dr[6];
      var mn=('Jan,Feb,Mar,Apr,May,Jun,Jul,Aug,Sep,Oct,Nov,Dec').split(',')[endM];
      if(mn)return mn+' '+endY;
    }
    // Pattern: "Statement Date: 18 Mar, 2026" or "Mar 2026" standalone
    var sdRe=/statement\s*date[:\s]+(\d{1,2})\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*[,\s]+(\d{4})/i;
    var sd=line.match(sdRe);
    if(sd){var mi=MNS.indexOf(sd[2].toLowerCase().slice(0,3));if(mi>=0){var mn=('Jan,Feb,Mar,Apr,May,Jun,Jul,Aug,Sep,Oct,Nov,Dec').split(',')[mi];return mn+' '+sd[3];}}
    // Pattern: Generation Date 22/03/2026
    var gdRe=/generation\s*date\s+(\d{2})[\/\-](\d{2})[\/\-](\d{4})/i;
    var gd=lines[i].match(gdRe);
    if(gd){var endM=parseInt(gd[2])-1;var mn=('Jan,Feb,Mar,Apr,May,Jun,Jul,Aug,Sep,Oct,Nov,Dec').split(',')[endM];if(mn)return mn+' '+gd[3];}
  }
  return null;
}

function handleFile(file){
  if(!file)return;
  var bank=document.getElementById('bankName').value.trim()||'Unknown Bank';
  var card=document.getElementById('cardName').value.trim();
  var cur=document.getElementById('curSel').value;
  showSt('Reading PDF...','info',true);
  file.arrayBuffer().then(function(buf){
    return pdfjsLib.getDocument({data:buf}).promise;
  }).then(function(pdf){
    var pages=[];
    for(var i=1;i<=pdf.numPages;i++) pages.push(i);
    return pages.reduce(function(p,pgNum){
      return p.then(function(lines){
        return pdf.getPage(pgNum).then(function(page){
          return page.getTextContent().then(function(c){
            var byY={};
            c.items.forEach(function(item){
              var y=Math.round(item.transform[5]);
              if(!byY[y])byY[y]=[];
              byY[y].push({x:item.transform[4],str:item.str});
            });
            Object.keys(byY).sort(function(a,b){return Number(b)-Number(a);}).forEach(function(y){
              var row=byY[y].sort(function(a,b){return a.x-b.x;}).map(function(i){return i.str;}).join(' ').trim();
              if(row)lines.push(row);
            });
            return lines;
          });
        });
      });
    },Promise.resolve([]));
  }).then(function(lines){
    // Auto-detect month from PDF
    var detectedMonth=detectMonth(lines);
    var month=detectedMonth||document.getElementById('monthSel').value;
    if(detectedMonth){
      // Update the dropdown to match
      var sel=document.getElementById('monthSel');
      var found=false;
      for(var i=0;i<sel.options.length;i++){if(sel.options[i].value===detectedMonth){sel.value=detectedMonth;found=true;break;}}
      if(!found){var o=document.createElement('option');o.value=detectedMonth;o.textContent=detectedMonth;sel.insertBefore(o,sel.firstChild);sel.value=detectedMonth;}
      showSt('Auto-detected: '+detectedMonth+' — parsing transactions...','info',true);
    } else {
      showSt('Parsing transactions...','info',true);
    }
    if(!store[month])store[month]=[];
    am=month;
    var txns=parseTxns(lines,bank,card,cur,month);
    if(!txns.length){
      showSt('No transactions found. Make sure this is a credit card statement PDF with transaction rows.','error');
      return;
    }
    store[month]=(store[month]||[]).concat(txns);
    ss();
    showSt('✓ Auto-detected '+month+' — added '+txns.length+' transactions from '+bank,'success');
    rTabs();rMC();
    document.getElementById('clrBtn').style.display='inline-flex';
    document.getElementById('shBtn').style.display='inline-flex';
  }).catch(function(err){showSt('Error: '+err.message,'error');});
}

function parseTxns(lines,bank,card,cur,month){
  var txns=[];
  var dRe=/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/;
  var aRe=/(\d{1,3}(?:,\d{2,3})*\.\d{2})/g;
  var skip=/reward\s*point|gst\s*summ|igst|cgst|sgst|minimum\s*due|credit\s*limit|available\s*credit|statement\s*date|billing\s*period|opening\s*balance|previous\s*statement|finance\s*charg|schedule\s*of\s*charg|important\s*info|page\s*[:\-]\s*\d|hsn\s*code|gstin|dear\s*customer|contact\s*us|grievance|nodal\s*officer|useful\s*links|purchase\s*indicator|points\s*expir|edge\s*reward|customer\s*id|balance\s*as\s*on|total\s*amount\s*due|minimum\s*payment\s*due|payment\s*summary|credit\s*card\s*number|making\s*only\s*the|repayment|emi|cash\s*withdrawal\s*fee|overdue\s*penalty|foreign\s*currency\s*transaction\s*fee|joining\s*fee|annual\s*fee|cheque\s*return|surcharge|add\s*on\s*card|over\s*limit\s*penalty|duplicate\s*statement/i;

  lines.forEach(function(line){
    if(!line||line.length<8)return;
    if(skip.test(line))return;
    var dm=line.match(dRe);
    if(!dm)return;
    var y=dm[3];if(y.length===2)y='20'+y;
    var date=dm[1].padStart(2,'0')+'/'+dm[2].padStart(2,'0')+'/'+y;
    var ams=[];var m;var re=new RegExp(aRe.source,'g');
    while((m=re.exec(line))!==null){
      var v=parseFloat(m[1].replace(/,/g,''));
      if(v>0&&v<99999999)ams.push(v);
    }
    if(!ams.length)return;
    var amount=ams[ams.length-1];
    var merchant=line
      .replace(dRe,'')
      .replace(/\|\s*\d{2}:\d{2}(:\d{2})?/g,'')
      .replace(/\(Ref#[^)]+\)/gi,'')
      .replace(/Ref#\s*\S+/gi,'')
      .replace(/\b(ST|DP|VT|UPI|NEFT|IMPS)\d{8,}/gi,'')
      .replace(new RegExp(aRe.source,'g'),'')
      .replace(/\b(Cr|Dr|CR|DR)\b/g,'')
      .replace(/[+\-|*]/g,' ')
      .replace(/\s{2,}/g,' ')
      .trim();
    if(!merchant||merchant.length<2)merchant='Transaction';
    merchant=merchant.split(' ').filter(function(w){return w.length>0;}).map(function(w){return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase();}).join(' ');
    var isCredit=/\+\s*(?:C\s*)?\d|\bCr\b|PAYMENT\s*RECEIVED|REFUND|REVERSAL|CASH\s*BACK|CREDIT\s*RECEIVED|\d+\s*Cr\b/i.test(line);
    txns.push({
      id:Date.now()+'_'+Math.random().toString(36).slice(2,8),
      bank:bank,card:card||'',currency:cur,date:date,
      merchant:merchant,amount:amount,type:isCredit?'credit':'debit',
      category:gCat(merchant+' '+line),remarks:'',done:false,month:month
    });
  });
  return txns;
}

function gCat(t){
  var s=t.toLowerCase();
  if(/zomato|swiggy|restaurant|cafe|\bfood\b|kitchen|dhaba|pizza|burger|kfc|mcdonald|starbucks|haldiram|biryani|diner/.test(s))return'Food & Dining';
  if(/amazon|flipkart|myntra|ajio|nykaa|shoppers|reliance.digital|croma|vijay.sales|tata.cliq|meesho/.test(s))return'Shopping';
  if(/petrol|fuel|\bhp\b|bharat.petro|indian.oil|shell|iocl|bpcl/.test(s))return'Fuel';
  if(/uber|ola|rapido|metro|irctc|railway|redbus|cleartrip|transport/.test(s))return'Transport';
  if(/makemytrip|goibibo|booking\.|airbnb|flight|airline|indigo|air.india|spicejet|vistara/.test(s))return'Travel';
  if(/hospital|pharmacy|medical|doctor|apollo|fortis|medplus|health|clinic|diagnostic/.test(s))return'Health';
  if(/netflix|hotstar|spotify|prime.video|gaming|cinema|pvr|inox|bookmyshow/.test(s))return'Entertainment';
  if(/electricity|water|\bgas\b|broadband|airtel|jio|bsnl|vodafone|\bvi\b|bbps|recharge|postpaid/.test(s))return'Utilities';
  if(/bigbasket|blinkit|zepto|dmart|grofer|supermarket|grocery/.test(s))return'Groceries';
  if(/apple|samsung|oneplus|\bmi\b|realme|oppo|vivo|laptop|iphone/.test(s))return'Electronics';
  return'Other';
}

function rMC(){
  var c=document.getElementById('mc');
  if(!am||!store[am]){c.innerHTML='<div class="empty">Click + to add a month, then drop a PDF above.</div>';return;}
  var txns=store[am];
  if(!txns.length){c.innerHTML='<div class="empty">No transactions for '+am+'. Drop a PDF above.</div>';return;}
  var dbt=txns.filter(function(t){return t.type==='debit';}).reduce(function(s,t){return s+t.amount;},0);
  var crd=txns.filter(function(t){return t.type==='credit';}).reduce(function(s,t){return s+t.amount;},0);
  var dn=txns.filter(function(t){return t.done;}).length;
  var banks=[...new Set(txns.map(function(t){return t.bank;}))];
  var cats=[...new Set(txns.map(function(t){return t.category;}))].sort();
  var bSum=banks.map(function(b){
    var bt=txns.filter(function(t){return t.bank===b&&t.type==='debit';}).reduce(function(s,t){return s+t.amount;},0);
    return '<span><b>'+b+':</b> '+fmt(bt,txns[0].currency)+'</span>';
  }).join('');
  c.innerHTML='<div class="stats"><div class="stat"><div class="sl">Transactions</div><div class="sv ac">'+txns.length+'</div></div><div class="stat"><div class="sl">Total debits</div><div class="sv rd">'+fmt(dbt,txns[0].currency)+'</div></div><div class="stat"><div class="sl">Total credits</div><div class="sv gn">'+fmt(crd,txns[0].currency)+'</div></div><div class="stat"><div class="sl">Banks</div><div class="sv bl">'+banks.length+'</div></div><div class="stat"><div class="sl">Verified</div><div class="sv" id="dv">'+dn+' / '+txns.length+'</div></div></div>'
    +'<div class="ms"><span>By bank:</span>'+bSum+'</div>'
    +'<div class="toolbar"><input class="ti srch" type="text" id="si" placeholder="Search merchant..." oninput="ft()"><select class="ti" id="bf" onchange="ft()"><option value="">All banks</option>'+banks.map(function(b){return'<option>'+b+'</option>';}).join('')+'</select><select class="ti" id="cf" onchange="ft()"><option value="">All categories</option>'+cats.map(function(c){return'<option>'+c+'</option>';}).join('')+'</select><select class="ti" id="sf" onchange="ft()"><option value="">All</option><option value="pending">Pending</option><option value="done">Done</option></select></div>'
    +'<div class="tw"><table><thead><tr><th style="width:46px;text-align:center">Done</th><th style="width:100px">Date</th><th style="width:110px">Bank</th><th>Merchant</th><th style="width:130px;text-align:right">Amount</th><th style="width:130px">Category</th><th style="width:190px">Remarks</th></tr></thead><tbody id="tb"></tbody></table></div>'
    +'<div class="empty" id="em" style="display:none">No matches.</div>';
  ft();
}

function ft(){
  if(!am)return;
  var txns=store[am]||[];
  var s=(document.getElementById('si')||{}).value||'';s=s.toLowerCase();
  var bf=(document.getElementById('bf')||{}).value||'';
  var cf=(document.getElementById('cf')||{}).value||'';
  var sf=(document.getElementById('sf')||{}).value||'';
  var fil=txns.filter(function(t){
    if(s&&t.merchant.toLowerCase().indexOf(s)<0&&t.bank.toLowerCase().indexOf(s)<0)return false;
    if(bf&&t.bank!==bf)return false;
    if(cf&&t.category!==cf)return false;
    if(sf==='pending'&&t.done)return false;
    if(sf==='done'&&!t.done)return false;
    return true;
  });
  var tb=document.getElementById('tb'),em=document.getElementById('em');
  if(!tb)return;
  if(!fil.length){tb.innerHTML='';if(em)em.style.display='block';return;}
  if(em)em.style.display='none';
  tb.innerHTML=fil.map(function(t){
    return'<tr class="'+(t.done?'dk':'')+'" id="r-'+t.id+'">'
      +'<td style="width:46px;text-align:center" class="nd"><input type="checkbox" '+(t.done?'checked':'')+' onchange="td_(\''+t.id+'\',this.checked)"></td>'
      +'<td style="font-family:\'DM Mono\',monospace;font-size:12px;color:var(--t2)">'+esc(t.date)+'</td>'
      +'<td><span class="bb">'+esc(t.bank)+'</span></td>'
      +'<td><div style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px">'+esc(t.merchant)+'</div></td>'
      +'<td style="text-align:right;font-family:\'DM Mono\',monospace" class="'+(t.type==='credit'?'cdt':'dbt')+'">'+(t.type==='credit'?'+':'-')+' '+fmt(t.amount,t.currency)+'</td>'
      +'<td><span class="bg '+cc(t.category)+'">'+esc(t.category)+'</span></td>'
      +'<td><input class="ri" type="text" placeholder="Add note..." value="'+esc(t.remarks)+'" onchange="ur(\''+t.id+'\',this.value)"></td>'
      +'</tr>';
  }).join('');
}

function td_(id,val){
  if(!am)return;
  var t=store[am].find(function(x){return x.id===id;});
  if(t){t.done=val;ss();}
  var row=document.getElementById('r-'+id);if(row)row.className=val?'dk':'';
  var dn=store[am].filter(function(t){return t.done;}).length;
  var el=document.getElementById('dv');if(el)el.textContent=dn+' / '+store[am].length;
}
function ur(id,val){if(!am)return;var t=store[am].find(function(x){return x.id===id;});if(t){t.remarks=val;ss();}}
function clearMonth(){
  if(!am)return;
  if(!confirm('Clear all transactions for '+am+'?'))return;
  delete store[am];am='';ss();rTabs();
  document.getElementById('mc').innerHTML='<div class="empty">Drop a PDF to get started.</div>';
  document.getElementById('clrBtn').style.display='none';
  document.getElementById('shBtn').style.display='none';
}
function sendToSheets(){
  var url=document.getElementById('sheetsUrl').value.trim();
  if(!url){showSt('Please add your Google Sheets URL first.','error');return;}
  if(!am||!store[am]||!store[am].length){showSt('No transactions to send.','error');return;}
  showSt('Sending '+store[am].length+' transactions...','info',true);
  fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({month:am,transactions:store[am]})})
    .then(function(){showSt('✓ '+store[am].length+' transactions sent to Google Sheets!','success');})
    .catch(function(e){showSt('Failed: '+e.message,'error');});
}
function testConn(){
  var url=document.getElementById('sheetsUrl').value.trim();
  if(!url){showSt('Paste your Sheets URL first.','error');return;}
  showSt('Testing...','info',true);
  fetch(url,{method:'GET',mode:'no-cors'})
    .then(function(){showSt('✓ Connected! Sheet is ready.','success');})
    .catch(function(){showSt('Could not connect.','error');});
}
function fmt(n,cur){return(cur||'INR')+' '+Number(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function cc(c){var m={'Food & Dining':'bf','Shopping':'bs','Transport':'btr','Travel':'btv','Health':'bh','Fuel':'btr','Utilities':'bu','Entertainment':'be','Groceries':'bf','Electronics':'bs','Other':'bo'};return m[c]||'bo';}
function showSt(msg,type,spin){
  var b=document.getElementById('sb'),sp=document.getElementById('sp');
  document.getElementById('sm').textContent=msg;
  b.className='status '+type;sp.style.display=spin?'block':'none';b.style.display='flex';
  if(!spin)setTimeout(function(){b.style.display='none';},6000);
}
</script>
</body>
